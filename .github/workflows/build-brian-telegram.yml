name: Build brian-telegram image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - src/**
      - package.json
      - package-lock.json
  schedule:
    # Rebuild weekly (Sunday 04:00 UTC) to pick up Node base image security patches
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brian-telegram:latest
            ghcr.io/${{ github.repository_owner }}/brian-telegram:${{ github.sha }}
