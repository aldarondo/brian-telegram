services:
  brian-telegram:
    image: ghcr.io/aldarondo/brian-telegram:latest
    container_name: brian-telegram
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /volume1/docker/brian-telegram/sessions:/app/data/sessions
      - /volume1/docker/brian-telegram/logs:/app/logs
      - /volume1/docker/brian-telegram/config/family.json:/app/config/family.json:ro
      - /volume1/docker/brian-telegram/config/mcp.json:/app/config/mcp.json:ro
      # Mount Claude credentials — copy ~/.claude from dev machine to this path on the NAS
      - /volume1/docker/brian-telegram/claude-creds:/home/brian/.claude
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BRIAN_MCP_CLIENT_ID=${BRIAN_MCP_CLIENT_ID}
      - BRIAN_MCP_CLIENT_SECRET=${BRIAN_MCP_CLIENT_SECRET}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - SESSION_TTL_HOURS=24
      - MAX_TURNS=5
    networks:
      - brian-mcp_default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  brian-mcp_default:
    external: true   # cloudflared + mcp-memory live on this network
