services:
  brian-telegram:
    build: .
    container_name: brian-telegram
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./data/sessions:/app/data/sessions
      - ./config/family.json:/app/config/family.json:ro
      # Mount host Claude credentials — uses your Claude.ai subscription, no API key needed.
      # On Windows with Docker Desktop this path is the WSL2/Linux home; adjust if needed.
      - /root/.claude:/root/.claude:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BRIAN_MCP_CLIENT_ID=${BRIAN_MCP_CLIENT_ID}
      - BRIAN_MCP_CLIENT_SECRET=${BRIAN_MCP_CLIENT_SECRET}
      - SESSION_TTL_HOURS=24
      - MAX_TURNS=5
    networks:
      - brian-net

networks:
  brian-net:
    external: true   # shared with brian-mcp stack
